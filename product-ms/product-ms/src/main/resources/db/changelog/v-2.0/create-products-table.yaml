databaseChangeLog:
  - changeSet:
      id: 001-create-products-table-2026-01-17
      author: Hamid Guluzadeh
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: product_id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: product_name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: username
                  type: varchar(30)
                  constraints:
                    nullable: false

              - column:
                  name: stock
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: price
                  type: NUMERIC(6,2)
                  constraints:
                    nullable: false

              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: category_id
            constraintName: fk_product_category
