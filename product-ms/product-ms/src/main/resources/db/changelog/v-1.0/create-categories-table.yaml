databaseChangeLog:
  - changeSet:
      id: 001-create-categories-table-2026-01-17
      author: Hamid Guluzadeh
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: category_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
