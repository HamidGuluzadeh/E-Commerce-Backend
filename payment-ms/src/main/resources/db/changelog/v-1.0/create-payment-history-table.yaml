databaseChangeLog:
  - changeSet:
      id: 001-create-payment-history-table
      author: Hamid Guluzadeh
      changes:
        - createTable:
            tableName: PAYMENT_HISTORY
            columns:
              - column:
                  name: id
                  type: varchar(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: order_id
                  type: varchar(100)
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: azericard_status
                  type: varchar(100)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
