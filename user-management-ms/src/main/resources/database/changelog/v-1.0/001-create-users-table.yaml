databaseChangeLog:
  - changeSet:
      id: 001-create-users-table-2026-01-12
      author: Hamid Guluzadeh
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: char(36)
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: varchar(30)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: first_name
                  type: varchar(20)
                  constraints:
                    nullable: false

              - column:
                  name: last_name
                  type: varchar(30)

              - column:
                  name: user_role
                  type: varchar(20)
                  constraints:
                    nullable: false

              - column:
                  name: user_password
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: phone_number
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: user_email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: user_birthdate
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: create_date
                  type: datetime(6)
                  defaultValueComputed: CURRENT_TIMESTAMP(6)
                  constraints:
                    nullable: false

              - column:
                  name: update_date
                  type: datetime(6)