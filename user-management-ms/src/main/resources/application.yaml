spring:
  application:
    name: user-management-ms

  datasource:
    url: jdbc:mysql://localhost:3306/user_management_db
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:database/changelog/db-changelog.yaml
    contexts: dev
    drop-first: false
    database-change-log-table: DATABASECHANGELOG
    database-change-log-lock-table: DATABASECHANGELOGLOCK

server:
  port: 8080
  servlet:
    context-path: /user-management-ms

jwt:
  accessToken:
    secret: "CHANGE_THIS_TO_A_VERY_LONG_RANDOM_SECRET_KEY_256_BITS_ACCESS"
    expiration-minutes: 15
  refreshToken:
    expiration-days: 7